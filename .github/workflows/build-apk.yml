name: Build APK

# Builds the debug APK on an x86 Linux runner (where Android's build tools work)
# and (a) uploads it as a run artifact and (b) publishes it as a Release asset so
# it has a stable, downloadable URL. Runs on every push and can be started
# manually from the Actions tab.
on:
  push:
  workflow_dispatch:

permissions:
  contents: write   # required to create the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumi-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Lumi debug build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
